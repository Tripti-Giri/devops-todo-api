name: CI/CD Pipeline

# ── Trigger ──────────────────────────────────────────
# Runs automatically on every push to main branch
on:
  push:
    branches: [main]

jobs:

  # ── Job 1: Test ────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest  # GitHub provides this free Linux machine

    steps:
      - name: Checkout code
        uses: actions/checkout@v3  # downloads your repo code

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest app/test_app.py -v
        # If ANY test fails, pipeline stops here
        # Docker image will NOT be built or deployed


  # ── Job 2: Build & Push Docker Image ──────────────
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test  # only runs if test job passed

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/todo-api:latest .

      - name: Push to DockerHub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/todo-api:latest


  # ── Job 3: Deploy to EC2 ───────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build  # only runs if build job passed

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull latest image from DockerHub
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/todo-api:latest

            # Stop and remove old container if running
            docker stop todo-api || true
            docker rm todo-api || true

            # Start new container
            docker run -d \
              --name todo-api \
              -p 5000:5000 \
              --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/todo-api:latest

            echo "✅ Deployment successful!"